# nginx config for Blazor WASM SPA — serves static files produced by `dotnet publish`

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;     # default nginx location, matches Dockerfile COPY
    index index.html;

    # Reverse proxy /api/* to the API container (Docker compose internal network).
    # Same-origin = no CORS needed in prod. See DEC-028 for the architectural choice.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: any unknown route falls back to index.html so Blazor client-side
    # router takes over. Without this, F5 on /recipes/abc-123 would return 404.
    location / {
        try_files $uri $uri/ /index.html =404;  
    }

    # Gzip compression — ~60-70% transfert WASM/JS/CSS reduction (++ for SPA Blazor)
    gzip on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;


}

