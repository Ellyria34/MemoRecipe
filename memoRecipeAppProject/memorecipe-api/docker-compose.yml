version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: memorecipe_postgres
    restart: always
    environment:
      POSTGRES_USER: memorecipe
      POSTGRES_PASSWORD: memopwd
      POSTGRES_DB: memorecipe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: memorecipe_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@memorecipe.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
